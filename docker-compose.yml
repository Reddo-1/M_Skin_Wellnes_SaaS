services:
  postgres:
    image: postgres:16
    container_name: mskin_postgres
    environment:
      POSTGRES_DB: mskin_wellness
      POSTGRES_USER: mskin_user
      POSTGRES_PASSWORD: mskin_pass
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - mskin_net

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: mskin_php
    working_dir: /var/www/html
    volumes:
      - ./M_Skin_Welness_BE:/var/www/html
    depends_on:
      - postgres
    networks:
      - mskin_net

  nginx:
    image: nginx:alpine
    container_name: mskin_nginx
    ports:
      - "8000:80"
    volumes:
      - ./M_Skin_Welness_BE:/var/www/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php
    networks:
      - mskin_net

  angular:
    build:
      context: .
      dockerfile: docker/angular/Dockerfile
    container_name: mskin_angular
    ports:
      - "4200:4200"
    volumes:
      - ./M_Skin_Welness_FE:/app
      - /app/node_modules
    networks:
      - mskin_net

volumes:
  pgdata:

networks:
  mskin_net:
    driver: bridge
